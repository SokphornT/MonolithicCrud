name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main

  pull_request:

env:
  IMAGE_NAME: monolithiccrud

jobs:

  ##################################
  # LINT
  ##################################
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt update
          sudo apt install yamllint -y

      - name: Lint YAML
        run: yamllint .github/workflows/ci-cd.yml
